<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Deep Squat Challenge</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #0f172a; color: white; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; }
        .video-container { position: relative; width: 100%; aspect-ratio: 3/4; background: #1e293b; border-radius: 16px; overflow: hidden; border: 2px solid #334155; margin-bottom: 20px; }
        canvas { width: 100%; height: 100%; object-fit: cover; }
        .counter { font-size: 60px; font-weight: 900; color: #818cf8; margin: 10px 0; }
        .btn { background-color: #6366f1; color: white; border: none; padding: 15px 20px; border-radius: 12px; font-size: 18px; font-weight: bold; width: 100%; cursor: pointer; }
        .btn:disabled { background-color: #475569; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: #818cf8; margin-top:0;">Deep Squat Challenge</h2>
    <p id="statusMsg">รอเริ่มเกม...</p>

    <div class="video-container">
        <video id="video" style="display: none;" playsinline></video>
        <canvas id="canvas"></canvas>
    </div>

    <div class="counter" id="counter">0<span style="font-size: 20px; color:#94a3b8;">/12</span></div>
    
    <button class="btn" id="btnStart" onclick="startGame()">🎥 เปิดกล้องเริ่มลุย!</button>
</div>

<script>
    // 1. ดึงข้อมูล User และ URL ขากลับ จากลิงก์ (URL Parameters)
    const urlParams = new URLSearchParams(window.location.search);
    const username = urlParams.get('user');
    const returnUrl = urlParams.get('returnUrl');

    if(!username) {
        document.getElementById('statusMsg').innerText = "❌ ไม่พบชื่อผู้ใช้งาน กรุณากลับไปเข้าสู่ระบบใหม่";
        document.getElementById('btnStart').style.display = 'none';
    } else {
        document.getElementById('statusMsg').innerText = "ผู้เล่น: " + username;
    }

    const SQUAT_TARGET = 12;
    let counter = 0;
    let state = 'up';
    let isRunning = false;

    // 2. ระบบ AI MediaPipe (โค้ดจะใช้งานกล้องได้ 100% เพราะไม่ได้อยู่ใน iFrame)
    function startGame() {
        document.getElementById('btnStart').style.display = 'none';
        document.getElementById('statusMsg').innerText = "กำลังเชื่อมต่อกล้อง...";

        const videoElement = document.getElementById('video');
        const canvasElement = document.getElementById('canvas');
        const canvasCtx = canvasElement.getContext('2d');

        const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
        pose.setOptions({ modelComplexity: 0, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
       pose.onResults((results) => {
            if (!isRunning) return;
            const canvasElement = document.getElementById('canvas');
            const canvasCtx = canvasElement.getContext('2d');
            
            canvasElement.width = canvasElement.clientWidth;
            canvasElement.height = canvasElement.clientHeight;
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.poseLandmarks) {
                drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#ffffff', lineWidth: 3});
                drawLandmarks(canvasCtx, results.poseLandmarks, {color: '#6366f1', lineWidth: 2, radius: 4});

                // ดึงจุดข้อต่อที่ต้องใช้งาน
                let nose = results.poseLandmarks[0];
                let shoulder = results.poseLandmarks[11]; // ไหล่ซ้าย
                let hip = results.poseLandmarks[23];      // สะโพกซ้าย
                let knee = results.poseLandmarks[25];     // เข่าซ้าย
                let ankle = results.poseLandmarks[27];    // ข้อเท้าซ้าย
                
                // ถ้าฝั่งขวาชัดกว่า ให้สลับไปใช้ฝั่งขวา
                if (results.poseLandmarks[24].visibility > results.poseLandmarks[23].visibility) {
                    shoulder = results.poseLandmarks[12];
                    hip = results.poseLandmarks[24]; 
                    knee = results.poseLandmarks[26]; 
                    ankle = results.poseLandmarks[28];
                }

                // 🛡️ Anti-Cheat ชั้นที่ 1: ต้องเห็นเต็มตัวตั้งแต่ จมูก ถึง ข้อเท้า (ค่าความชัดต้องเกิน 65%)
                if (nose.visibility < 0.65 || shoulder.visibility < 0.65 || hip.visibility < 0.65 || knee.visibility < 0.65 || ankle.visibility < 0.65) {
                    document.getElementById('statusMsg').innerText = "⚠️ ถอยหลังอีกนิดครับ ให้กล้องเห็นตั้งแต่หัวจรดเท้า";
                    document.getElementById('statusMsg').style.color = "#fca5a5"; 
                    canvasCtx.restore();
                    return; 
                }

                // 🛡️ Anti-Cheat ชั้นที่ 2: ป้องกันการนั่งเล่น หรือนอนเขย่า 
                // (แกน Y บนจอคือ 0 ด้านล่างคือ 1 ดังนั้นจมูกและไหล่ต้องค่าน้อยกว่าสะโพกเสมอ)
                if (nose.y >= hip.y || shoulder.y >= hip.y) {
                    document.getElementById('statusMsg').innerText = "⚠️ ไม่เนียนครับ! ลุกขึ้นยืนตรงๆ ให้กล้องเห็นชัดๆ";
                    document.getElementById('statusMsg').style.color = "#fca5a5"; 
                    canvasCtx.restore();
                    return; 
                }

                // คำนวณองศาข้อเข่า
                let angle = Math.abs((Math.atan2(ankle.y - knee.y, ankle.x - knee.x) - Math.atan2(hip.y - knee.y, hip.x - knee.x)) * 180.0 / Math.PI);
                if (angle > 180.0) angle = 360 - angle;

                // 🛡️ Anti-Cheat ชั้นที่ 3: ตัวแปรจับเวลาป้องกันการเขย่าแบบเดอะแฟลช
                window.lastRepTime = window.lastRepTime || 0;
                let currentTime = new Date().getTime();

                // ⬇️ จังหวะย่อตัว (Deep Squat)
                if (angle < 95 && hip.y >= knee.y - 0.15) {
                    if (state === 'up') { 
                        state = 'down'; 
                        document.getElementById('statusMsg').innerText = "⬇️ ลึกพอแล้ว! ดันตัวขึ้นเลย!"; 
                        document.getElementById('statusMsg').style.color = "#22c55e"; 
                        
                        // 🎵 โบนัส: ส่งเสียงตื๊ดสั้นๆ ให้รู้ว่าย่อลงถึงจุดที่ AI ยอมรับแล้ว
                        try {
                            let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                            let osc = audioCtx.createOscillator();
                            osc.type = 'sine';
                            osc.frequency.setValueAtTime(600, audioCtx.currentTime); // โทนเสียงความถี่ 600Hz
                            osc.connect(audioCtx.destination);
                            osc.start();
                            osc.stop(audioCtx.currentTime + 0.15); // ดังแค่ 0.15 วินาที
                        } catch(e) {}
                    }
                } 
                // ⬆️ จังหวะยืนขึ้น (ต้องยืนให้ตรง และสะโพกต้องเด้งกลับไปสูงกว่าเข่า)
                else if (angle > 160 && hip.y < knee.y - 0.2) { 
                    if (state === 'down') {
                        // 🛡️ Anti-Cheat ชั้นที่ 4: ความเร็ว (คนจริงสควอต 1 ครั้งต้องใช้เวลาอย่างน้อย 1 วินาที)
                        if (currentTime - window.lastRepTime > 1000) {
                            state = 'up';
                            counter++;
                            window.lastRepTime = currentTime; // อัปเดตเวลาที่ทำสำเร็จ
                            
                            document.getElementById('counter').innerHTML = counter + `<span style="font-size: 20px; color:#94a3b8;">/${SQUAT_TARGET}</span>`;
                            document.getElementById('statusMsg').innerText = "⬆️ เยี่ยม! ทำต่อไป!";
                            document.getElementById('statusMsg').style.color = "#c7d2fe";

                            if (counter >= SQUAT_TARGET) {
                                isRunning = false;
                                sendDataToGAS();
                            }
                        } else {
                            // จับได้ว่านั่งเขย่ามือถือ หรือย่อลุกเร็วผิดมนุษย์
                            state = 'up'; // บังคับให้เริ่มย่อใหม่ แต่ไม่แจกแต้มให้
                            document.getElementById('statusMsg').innerText = "⚠️ เร็วไปครับ! ย่อ-ยืด ช้าๆ ให้โดนกล้ามเนื้อ";
                            document.getElementById('statusMsg').style.color = "#fca5a5";
                        }
                    }
                }
            }
            canvasCtx.restore();
        });

        const camera = new Camera(videoElement, { onFrame: async () => { if(isRunning) await pose.send({image: videoElement}); }, width: 480, height: 640, facingMode: "user" });
        camera.start().then(() => { isRunning = true; document.getElementById('statusMsg').innerText = "🔥 ลุยเลย! ย่อให้สุด ยืดให้สุด"; });
    }

    // 3. ส่งข้อมูลกลับไปที่ API บน Google Apps Script เมื่อทำครบ
    async function sendDataToGAS() {
        document.getElementById('statusMsg').innerHTML = "🎉 สำเร็จ!<br>กำลังส่งแต้มและพากลับไปหน้าหลัก...";
        document.getElementById('statusMsg').style.color = "#fbbf24";
        
        // URL ของ API ที่คุณเพิ่งสร้างจาก doPost
        const API_URL = "https://script.google.com/macros/s/AKfycbyVrBPGDAm3ie8GhUu8NXayaAZpxLYbQtsv1UE8xpXgUTv3D56NxB-SPk19Zh0eHK8/exec";
        
        try {
            await fetch(API_URL, {
                method: "POST",
                mode: "no-cors", // จำเป็นสำหรับ GAS ยิงข้ามโดเมน
                body: JSON.stringify({ action: "completeSquatMission", username: username })
            });
            
            // รอเล็กน้อยให้เซิร์ฟเวอร์บันทึกข้อมูล แล้ว "ดีด" กลับแอปหลัก
            setTimeout(() => {
                window.location.href = returnUrl; 
            }, 1500);

        } catch (e) {
            document.getElementById('statusMsg').innerText = "❌ เกิดข้อผิดพลาดในการส่งข้อมูล";
        }
    }
</script>
</body>
</html>
