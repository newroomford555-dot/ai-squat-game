<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Deep Squat Challenge</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #0f172a; color: white; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; }
        .video-container { position: relative; width: 100%; aspect-ratio: 3/4; background: #1e293b; border-radius: 16px; overflow: hidden; border: 2px solid #334155; margin-bottom: 20px; }
        canvas { width: 100%; height: 100%; object-fit: cover; }
        .counter { font-size: 60px; font-weight: 900; color: #818cf8; margin: 10px 0; }
        .btn { background-color: #6366f1; color: white; border: none; padding: 15px 20px; border-radius: 12px; font-size: 18px; font-weight: bold; width: 100%; cursor: pointer; }
        .btn:disabled { background-color: #475569; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: #818cf8; margin-top:0;">Deep Squat Challenge</h2>
    <p id="statusMsg">รอเริ่มเกม...</p>

    <div class="video-container">
        <video id="video" style="display: none;" playsinline></video>
        <canvas id="canvas"></canvas>
    </div>

    <div class="counter" id="counter">0<span style="font-size: 20px; color:#94a3b8;">/12</span></div>
    
    <button class="btn" id="btnStart" onclick="startGame()">🎥 เปิดกล้องเริ่มลุย!</button>
</div>

<script>
    // 1. ดึงข้อมูล User และ URL ขากลับ จากลิงก์ (URL Parameters)
    const urlParams = new URLSearchParams(window.location.search);
    const username = urlParams.get('user');
    const returnUrl = urlParams.get('returnUrl');

    if(!username) {
        document.getElementById('statusMsg').innerText = "❌ ไม่พบชื่อผู้ใช้งาน กรุณากลับไปเข้าสู่ระบบใหม่";
        document.getElementById('btnStart').style.display = 'none';
    } else {
        document.getElementById('statusMsg').innerText = "ผู้เล่น: " + username;
    }

  const SQUAT_TARGET = 12;
    let counter = 0;
    let state = 'up';
    
    // 🌟 ตัวแปรจัดการสถานะ (State Machine) ของระบบ 4 เฟส
    let isRunning = false; 
    let isCountdown = false; 
    let countdownValue = 5;  
    let isWaitingForButton = false;
    let hasBodyBeenDetectedOnce = false;

    // 2. ระบบ AI MediaPipe 
    function startGame() {
        document.getElementById('btnStart').style.display = 'none';
        document.getElementById('statusMsg').innerText = "กำลังเชื่อมต่อกล้อง...";

        // 🌟 สร้างหน้าต่าง Popup ซ้อนทับวิดีโอ (สร้างผ่าน JS เพื่อไม่ให้กระทบ HTML เดิม)
        if (!document.getElementById('readyPopup')) {
            let popup = document.createElement('div');
            popup.id = 'readyPopup';
            popup.style.position = 'absolute';
            popup.style.top = '0';
            popup.style.left = '0';
            popup.style.width = '100%';
            popup.style.height = '100%';
            popup.style.backgroundColor = 'rgba(15, 23, 42, 0.85)'; // สีทึบโปร่งแสง
            popup.style.display = 'none';
            popup.style.flexDirection = 'column';
            popup.style.justifyContent = 'center';
            popup.style.alignItems = 'center';
            popup.style.zIndex = '10';
            popup.innerHTML = `
                <div style="font-size: 50px; margin-bottom: 10px;">🎯</div>
                <h3 style="color: #4ade80; margin-top: 0; margin-bottom: 10px;">ตำแหน่งเป๊ะแล้ว!</h3>
                <p style="color: #cbd5e1; font-size: 14px; margin-bottom: 25px; text-align: center; padding: 0 20px;">เดินมากดปุ่มด้านล่างนี้<br>เพื่อเริ่มจับเวลา 5 วินาที</p>
                <button id="btnStartCountdown" style="background-color: #f59e0b; color: #fff; border: none; padding: 15px 25px; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(245, 158, 11, 0.3);">⏳ เริ่มนับถอยหลัง 5 วิ</button>
            `;
            document.querySelector('.video-container').appendChild(popup);

            // เมื่อกดปุ่มเริ่มนับถอยหลัง
            document.getElementById('btnStartCountdown').onclick = () => {
                document.getElementById('readyPopup').style.display = 'none';
                isWaitingForButton = false;
                isCountdown = true;
                countdownValue = 5;
                
                // เริ่มทำงานตัวนับเวลา
                let countdownInterval = setInterval(() => {
                    if (countdownValue > 1) {
                        countdownValue--;
                        document.getElementById('statusMsg').innerText = `⏳ รีบเดินกลับไปยืนจุดเดิม... (${countdownValue} วิ)`;
                    } else {
                        clearInterval(countdownInterval);
                        isCountdown = false; 
                        isRunning = true; // เปิดโหมดจับท่าทางสควอตเต็มตัว!
                        document.getElementById('statusMsg').innerText = "🔥 ลุยเลย! ย่อให้สุด ยืดให้สุด";
                        document.getElementById('statusMsg').style.color = "#22c55e";
                    }
                }, 1000);
            };
        }

        const videoElement = document.getElementById('video');
        const canvasElement = document.getElementById('canvas');
        const canvasCtx = canvasElement.getContext('2d');

        const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
        pose.setOptions({ modelComplexity: 0, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        
        pose.onResults((results) => {
            // วาดโครงกระดูกให้เห็นตลอดเวลา (แม้ตอนยังไม่ได้เริ่มเกม) จะได้กะระยะถูก
            canvasElement.width = canvasElement.clientWidth;
            canvasElement.height = canvasElement.clientHeight;
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.poseLandmarks) {
                drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#ffffff', lineWidth: 3});
                drawLandmarks(canvasCtx, results.poseLandmarks, {color: '#6366f1', lineWidth: 2, radius: 4});

                let nose = results.poseLandmarks[0];
                let shoulder = results.poseLandmarks[11]; 
                let hip = results.poseLandmarks[23];      
                let knee = results.poseLandmarks[25];     
                let ankle = results.poseLandmarks[27];    
                
                if (results.poseLandmarks[24].visibility > results.poseLandmarks[23].visibility) {
                    shoulder = results.poseLandmarks[12];
                    hip = results.poseLandmarks[24]; 
                    knee = results.poseLandmarks[26]; 
                    ankle = results.poseLandmarks[28];
                }

                // เช็คว่าอยู่ในระยะกล้องเห็นครบตั้งแต่หัวจรดเท้าหรือไม่
                let isVisible = (nose.visibility >= 0.65 && shoulder.visibility >= 0.65 && hip.visibility >= 0.65 && knee.visibility >= 0.65 && ankle.visibility >= 0.65);

                // 🌟 เฟสที่ 1: สแกนหาร่างกายครั้งแรก
                if (!hasBodyBeenDetectedOnce) {
                    if (!isVisible) {
                        document.getElementById('statusMsg').innerText = "⚠️ ถอยหลังอีกนิดครับ ให้กล้องเห็นตั้งแต่หัวจรดเท้า";
                        document.getElementById('statusMsg').style.color = "#fca5a5"; 
                        canvasCtx.restore();
                        return; 
                    } else {
                        // พอเห็นเต็มตัวครั้งแรกปุ๊บ เปิด Popup ปุ่มกดทันที
                        hasBodyBeenDetectedOnce = true;
                        isWaitingForButton = true;
                        document.getElementById('readyPopup').style.display = 'flex';
                        document.getElementById('statusMsg').innerText = "✅ ตำแหน่งเป๊ะแล้ว! เดินมากดปุ่มเริ่มได้เลย";
                        document.getElementById('statusMsg').style.color = "#4ade80";
                        canvasCtx.restore();
                        return;
                    }
                }

                // 🌟 เฟสที่ 2: โชว์หน้าต่าง Popup รอผู้ใช้กดปุ่ม (พักการคำนวณ)
                if (isWaitingForButton) {
                    canvasCtx.restore();
                    return;
                }

                // 🌟 เฟสที่ 3: กำลังนับถอยหลัง 5 วินาที
                if (isCountdown) {
                    document.getElementById('statusMsg').innerText = `⏳ รีบเดินกลับไปยืนจุดเดิม... (${countdownValue} วิ)`;
                    document.getElementById('statusMsg').style.color = "#fbbf24";
                    canvasCtx.restore();
                    return; 
                }

                // 🌟 เฟสที่ 4: เกมเริ่ม! (ต้องอยู่ในโหมด isRunning เท่านั้น)
                if (!isRunning) {
                    canvasCtx.restore();
                    return;
                }

                // 🛡️ Anti-Cheat ชั้นที่ 1: ตรวจเช็คระหว่างเล่นว่าหลุดเฟรมหรือไม่
                if (!isVisible) {
                    document.getElementById('statusMsg').innerText = "⚠️ หลุดเฟรม! ถอยหลังให้เห็นเต็มตัวอีกครั้ง";
                    document.getElementById('statusMsg').style.color = "#fca5a5"; 
                    canvasCtx.restore();
                    return; 
                }

                // 🛡️ Anti-Cheat ชั้นที่ 2: ป้องกันการนั่งเล่น หรือนอนเขย่า 
                if (nose.y >= hip.y || shoulder.y >= hip.y) {
                    document.getElementById('statusMsg').innerText = "⚠️ ไม่เนียนครับ! ลุกขึ้นยืนตรงๆ ให้กล้องเห็นชัดๆ";
                    document.getElementById('statusMsg').style.color = "#fca5a5"; 
                    canvasCtx.restore();
                    return; 
                }

                let angle = Math.abs((Math.atan2(ankle.y - knee.y, ankle.x - knee.x) - Math.atan2(hip.y - knee.y, hip.x - knee.x)) * 180.0 / Math.PI);
                if (angle > 180.0) angle = 360 - angle;

                // 🛡️ Anti-Cheat ชั้นที่ 3: ตัวแปรจับเวลาความเร็ว
                window.lastRepTime = window.lastRepTime || 0;
                let currentTime = new Date().getTime();

                // ⬇️ จังหวะย่อตัว
                if (angle < 95 && hip.y >= knee.y - 0.15) {
                    if (state === 'up') { 
                        state = 'down'; 
                        document.getElementById('statusMsg').innerText = "⬇️ ลึกพอแล้ว! ดันตัวขึ้นเลย!"; 
                        document.getElementById('statusMsg').style.color = "#22c55e"; 
                        
                        try {
                            let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                            let osc = audioCtx.createOscillator();
                            osc.type = 'sine';
                            osc.frequency.setValueAtTime(600, audioCtx.currentTime); 
                            osc.connect(audioCtx.destination);
                            osc.start();
                            osc.stop(audioCtx.currentTime + 0.15); 
                        } catch(e) {}
                    }
                } 
                // ⬆️ จังหวะยืนขึ้น
                else if (angle > 160 && hip.y < knee.y - 0.2) { 
                    if (state === 'down') {
                        // 🛡️ Anti-Cheat ชั้นที่ 4: ความเร็ว (จำกัดที่ 1 วินาที/ครั้ง)
                        if (currentTime - window.lastRepTime > 1000) {
                            state = 'up';
                            counter++;
                            window.lastRepTime = currentTime; 
                            
                            document.getElementById('counter').innerHTML = counter + `<span style="font-size: 20px; color:#94a3b8;">/${SQUAT_TARGET}</span>`;
                            document.getElementById('statusMsg').innerText = "⬆️ เยี่ยม! ทำต่อไป!";
                            document.getElementById('statusMsg').style.color = "#c7d2fe";

                            if (counter >= SQUAT_TARGET) {
                                isRunning = false;
                                sendDataToGAS();
                            }
                        } else {
                            state = 'up'; 
                            document.getElementById('statusMsg').innerText = "⚠️ เร็วไปครับ! ย่อ-ยืด ช้าๆ ให้โดนกล้ามเนื้อ";
                            document.getElementById('statusMsg').style.color = "#fca5a5";
                        }
                    }
                }
            }
            canvasCtx.restore();
        });

        // 🌟 แก้ไขจุดนี้: สั่งให้กล้องส่งภาพไปให้ AI ประมวลผลตลอดเวลา (ตัดเงื่อนไข if(isRunning) ออก)
        const camera = new Camera(videoElement, { onFrame: async () => { await pose.send({image: videoElement}); }, width: 480, height: 640, facingMode: "user" });
        
        camera.start().then(() => { 
            // เริ่มต้นที่เฟส 1 สแกนหาตัวผู้เล่น
            document.getElementById('statusMsg').innerText = "🔍 ถอยหลังไปตั้งหลักให้กล้องเห็นเต็มตัวครับ";
            document.getElementById('statusMsg').style.color = "#818cf8";
        });
    }

    // 3. ส่งข้อมูลกลับไปที่ API บน Google Apps Script เมื่อทำครบ
    async function sendDataToGAS() {
        document.getElementById('statusMsg').innerHTML = "🎉 สำเร็จ!<br>กำลังส่งแต้มและพากลับไปหน้าหลัก...";
        document.getElementById('statusMsg').style.color = "#fbbf24";
        
        // URL ของ API ที่คุณเพิ่งสร้างจาก doPost
        const API_URL = "https://script.google.com/macros/s/AKfycbyVrBPGDAm3ie8GhUu8NXayaAZpxLYbQtsv1UE8xpXgUTv3D56NxB-SPk19Zh0eHK8/exec";
        
        try {
            await fetch(API_URL, {
                method: "POST",
                mode: "no-cors", // จำเป็นสำหรับ GAS ยิงข้ามโดเมน
                body: JSON.stringify({ action: "completeSquatMission", username: username })
            });
            
            // รอเล็กน้อยให้เซิร์ฟเวอร์บันทึกข้อมูล แล้ว "ดีด" กลับแอปหลัก
            setTimeout(() => {
                window.location.href = returnUrl; 
            }, 1500);

        } catch (e) {
            document.getElementById('statusMsg').innerText = "❌ เกิดข้อผิดพลาดในการส่งข้อมูล";
        }
    }
</script>
</body>
</html>
